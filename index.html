<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرة أرضية 3D متفاعلة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020208; /* خلفية الفضاء الداكنة */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        .title {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="title">كوكب الأرض ثلاثي الأبعاد - اسحب للتدوير</div>
    <div id="canvas-container"></div>

    <script>
        // 1. إعداد المشهد والكاميرا
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4); // إرجاع الكاميرا للخلف لرؤية الكوكب بالكامل

        // 2. محرك الريندرر (Renderer) والتنعيم
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 3. التحكم بالكاميرا بسلاسة بالماوس (Orbit Controls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true; // السماح بعمل زووم للداخل والخارج

        // 4. الإضاءة (لإعطاء تأثير الليل والنهار على الكوكب)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3); // إضاءة خافتة شاملة
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.3); // إضاءة الشمس القوية من جانب واحد
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // 5. تحميل الأنسجة (Textures) - صور خريطة الأرض والغيوم
        const textureLoader = new THREE.TextureLoader();
        
        // صور مجانية ومباشرة لخريطة الأرض والغيوم والفضاء
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const bumpTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const cloudsTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

        // 6. إنشاء مجسم كوكب الأرض
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64); // مجسم كروي عالي الدقة
        const earthMaterial = new THREE.MeshStandardMaterial({
            map: earthTexture,
            bumpMap: bumpTexture, // لإعطاء تضاريس خفيفة وواقعية للبحار واليابسة
            bumpScale: 0.05,
            roughness: 0.6
        });
        const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earthMesh);

        // 7. إنشاء طبقة غيوم منفصلة فوق الأرض بقليل (تأثير رائع)
        const cloudsGeometry = new THREE.SphereGeometry(1.02, 64, 64); // أكبر من كوكب الأرض بقليل
        const cloudsMaterial = new THREE.MeshStandardMaterial({
            map: cloudsTexture,
            transparent: true, // تفعيل الشفافية لتظهر الأرض من تحت الغيوم
            blending: THREE.AdditiveBlending,
            opacity: 0.4
        });
        const cloudsMesh = new THREE.Mesh(cloudsGeometry, cloudsMaterial);
        scene.add(cloudsMesh);

        // 8. إضافة جزيئات النجوم في الخلفية (Stars Dust)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);

        for (let i = 0; i < starsCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 50; // توزيع عشوائي في الفضاء
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // 9. الاستجابة لتغيير حجم الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 10. حلقة التحريك المستمر (Animation Loop)
        function animate() {
            requestAnimationFrame(animate);

            // دوران كوكب الأرض حول نفسه ببطء شديد
            earthMesh.rotation.y += 0.001;

            // دوران الغيوم بسرعة مختلفة لتأثير واقعي ديناميكي
            cloudsMesh.rotation.y += 0.0015;
            cloudsMesh.rotation.x += 0.0002;

            // تحديث تحكم الماوس (لتأثير الانسيابية)
            controls.update();

            // رندرة المشهد
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
